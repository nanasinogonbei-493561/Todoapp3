version: '3.8'

services:
  # MySQLデータベース
  mysql:
    image: mysql:8.0
    container_name: todo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-todo_prod}
      MYSQL_USER: ${MYSQL_USER:-todo_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-todopassword}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/schema-prod.sql:/docker-entrypoint-initdb.d/schema.sql
      - ./docker/mysql/conf.d:/etc/mysql/conf.d
    networks:
      - todo-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Spring Bootアプリケーション
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-app
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-todo_prod}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
      MYSQL_USERNAME: ${MYSQL_USER:-todo_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-todopassword}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      SERVER_PORT: ${SERVER_PORT:-8080}
      APP_NAME: ${APP_NAME:-Todo Application}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-WARN}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - app_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - todo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Nginxリバースプロキシ（オプション）
  nginx:
    image: nginx:alpine
    container_name: todo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - todo-network

volumes:
  mysql_data:
    driver: local
  app_logs:
    driver: local
  nginx_logs:
    driver: local

networks:
  todo-network:
    driver: bridge 